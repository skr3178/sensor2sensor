# Sensor2Sensor minimum pipeline — single source of truth for dimensions.
# Referenced by every module so reshapes are never hard-coded.

image:
  height: 256
  width: 448
  sd_vae_downsample: 8          # SD 1.5 VAE: spatial /8
  latent_channels: 4            # SD 1.5 VAE latent
  # Project-local checkpoint location. Populated by scripts/download_image_vae.py.
  # When this folder is present, image_encoder.py loads from it directly instead of
  # falling back to the HuggingFace global cache (~/.cache/huggingface/).
  vae_local_dir: s2s_min/checkpoints/sd15_vae
  vae_subfolder: vae           # files live at {vae_local_dir}/{vae_subfolder}/
  vae_variant: fp16            # loads diffusion_pytorch_model.fp16.safetensors

raymap:
  channels: 6                   # origin (3) + direction (3)

lidar:
  range_image_h: 32             # nuScenes 32-beam
  range_image_w: 1024
  channels: 3                   # range, intensity, validity (no elongation; nuScenes LiDAR doesn't ship it)
  range_clamp_m: 100            # nuScenes max range (paper uses 150 for Waymo)
  intensity_max: 255            # nuScenes raw .bin intensity is uint8 in [0, 255]
  vae_downsample: 4             # 32 -> 8, 1024 -> 256
  latent_channels: 8

# Pre-pooled cross-attention KV context: (image_latent + raymap) pooled to this grid
kv_context:
  channels: 10                  # image_latent.channels + raymap.channels = 4 + 6
  height: 8
  width: 64

# LiDAR U-Net (single tower)
unet:
  in_channels: 8                # = lidar.latent_channels
  out_channels: 8
  stem_channels: 96
  level_channels: [96, 192, 384]
  num_res_blocks_per_level: 2
  num_heads: 8
  downsample_h_once: false      # optional knob: collapses H=8 -> 4 at stem
  groupnorm_groups: 32
  cross_attn_kv_channels: 10    # = kv_context.channels

# Diffusion schedule (used from M0 onward)
diffusion:
  num_train_timesteps: 1000
  beta_schedule: scaled_linear
  prediction_type: v_prediction
  inference_steps: 25
